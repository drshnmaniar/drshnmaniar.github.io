name: Build CV & Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages (auto-enables Pages with Actions source)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # ---- LaTeX → PDF: the CV is always compiled fresh from source ----
      - name: Compile CV (English)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: LaTex

      - name: Compile CV (German)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main_de.tex
          working_directory: LaTex

      - name: Place PDFs into site
        run: |
          mkdir -p public/cv
          cp LaTex/main.pdf public/cv/DarshanManiar-CV.pdf
          cp LaTex/main_de.pdf public/cv/DarshanManiar-CV-DE.pdf

      # ---- React build ----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          CI: "false" # don't fail the build on lint warnings

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
